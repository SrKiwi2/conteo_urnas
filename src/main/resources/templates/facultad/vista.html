<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Facultad</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioFacultad" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalFacultad"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function cargarTabla() {
        $.ajax({
            type: 'POST',
            url: "/facultad/tabla-registro",  // Ruta del metodo del controlador en Spring Boot
            success: function (response) {
                $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
            }
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/facultad/formulario", "#contenidoModalFacultad", "#formularioFacultad");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/facultad/formulario-edit", "#contenidoModalFacultad", "#formularioFacultad");
    }
 
    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/facultad/eliminar",cargarTabla);
    }

</script>
