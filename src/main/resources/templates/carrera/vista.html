<h4 class="py-3 mb-4"><span class="text-muted fw-light">Menú /</span> Carrera</h4>

<div id="tablaRegistro"></div>

<div class="modal fade" id="modalFormularioCarrera" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="contenidoModalCarrera"></div>
    </div>
</div>

<script>
    $(document).ready(function () {
        cargarTabla();

    });

    function cargarTabla() {
        $.ajax({
            type: 'POST',
            url: "/carrera/tabla-registro",  // Ruta del metodo del controlador en Spring Boot
            success: function (response) {
                $("#tablaRegistro").html(response);  // Actualiza el contenido del div con la respuesta del servidor
            }
        });
    }

    function cargarFormulario() {
        cargarFormularioAlert("/carrera/formulario", "#contenidoModalCarrera", "#formularioCarrera");
    }

    function cargarFormularioEdit(id) {
        cargarFormularioEditAlert(id, "/carrera/formulario-edit", "#contenidoModalCarrera", "#formularioCarrera");
    }
 
    function eliminar(nombre, id) {
        eliminarRegistroAlert(nombre, id, "/carrera/eliminar",cargarTabla);
    }

</script>
