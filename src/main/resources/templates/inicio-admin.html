<!doctype html>

<html lang="en" class="light-style layout-navbar-fixed layout-menu-fixed layout-compact" dir="ltr"
    data-theme="theme-default" data-assets-path="../../assets/" data-template="vertical-menu-template">

<head th:replace="~{layout/head :: head}"></head>

<body>
    <style>
        .swal2-container {
            z-index: 9999 !important;
            /* Asegúrate de que sea mayor que cualquier otro elemento */
        }
    </style>
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
        <div class="layout-container">
            <!-- Menu -->
            <aside th:replace="~{layout/sidebar :: sidebar}"></aside>
            <!-- / Menu -->

            <!-- Layout container -->
            <div class="layout-page">
                <!-- Navbar -->
                <nav th:replace="~{layout/topbar :: topbar}"></nav>
                <!-- / Navbar -->

                <!-- Content wrapper -->
                <div class="content-wrapper">
                    <!-- Content -->

                    <div class="container-xxl flex-grow-1 container-p-y" id="contenido">
                    </div>
                    <!-- / Content -->

                    <!-- Footer -->
                    <footer th:replace="~{layout/footer :: footer}"></footer>
                    <!-- / Footer -->
                </div>
                <!-- Content wrapper -->
            </div>
            <!-- / Layout page -->
        </div>
    </div>
    <!-- / Layout wrapper -->
    <div th:replace="~{layout/script :: script}"></div>
    <script>
        var botonPulsado;
        $(document).ready(function () {

            // ventana por defecto al iniciar sesión
            cargarContenido("/adm/vista-administrador");
            botonPulsado = document.getElementById("opcion_admin");
            botonPulsado.classList.add("active");

            // menú de rol
            $("#opcion_rol").click(function (e) {
                e.preventDefault();
                cargarContenido("/rol/vista");

                if (botonPulsado.classList.contains("active")) {
                    botonPulsado.classList.remove("active");
                }

                botonPulsado = document.getElementById("opcion_rol");;

                botonPulsado.classList.add("active");

            });

            // menú de usuario
            $("#opcion_usuario").click(function (e) {
                e.preventDefault();
                cargarContenido("/usuario/vista");

                if (botonPulsado.classList.contains("active")) {
                    botonPulsado.classList.remove("active");
                }

                botonPulsado = document.getElementById("opcion_usuario");;

                botonPulsado.classList.add("active");

            });

            // menú de persona
            $("#opcion_persona").click(function (e) {
                e.preventDefault();
                cargarContenido("/persona/vista");

                if (botonPulsado.classList.contains("active")) {
                    botonPulsado.classList.remove("active");
                }

                botonPulsado = document.getElementById("opcion_persona");;

                botonPulsado.classList.add("active");

            });

            $("#opcion_jurado").click(function (e) {
                e.preventDefault();
                cargarContenido("/jurado/vista");

                if (botonPulsado.classList.contains("active")) {
                    botonPulsado.classList.remove("active");
                }

                botonPulsado = document.getElementById("opcion_jurado");;

                botonPulsado.classList.add("active");

            });
            $("#opcion_frente").click(function (e) {
                e.preventDefault();
                cargarContenido("/frente/vista");

                if (botonPulsado.classList.contains("active")) {
                    botonPulsado.classList.remove("active");
                }

                botonPulsado = document.getElementById("opcion_frente");;

                botonPulsado.classList.add("active");

            });

            $("#opcion_mesa").click(function (e) {
                e.preventDefault();
                cargarContenido("/mesa/vista");

                if (botonPulsado.classList.contains("active")) {
                    botonPulsado.classList.remove("active");
                }

                botonPulsado = document.getElementById("opcion_mesa");;

                botonPulsado.classList.add("active");

            });

            
            // Función para cargar el contenido de la opción seleccionada
            function cargarContenido(url) {
                // Verifica si la sesión está activa antes de cargar el contenido
                $.ajax({
                    url: "/adm/cargar-datos",
                    method: "GET",
                    success: function () {
                        // Si la sesión es válida, carga el contenido solicitado
                        $("#contenido").html(`
                            <div class="d-flex justify-content-center">
                                <div class="spinner-border m-5 text-secondary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>`);

                        $.ajax({
                            url: url,
                            method: "GET",
                            success: function (data) {
                                $("#contenido").html(data); // Carga el contenido si todo está bien
                            },
                            error: function (xhr) {
                                console.error('Error en la solicitud:', xhr);
                            }
                        });
                    },
                    error: function (xhr) {
                        if (xhr.status === 401) {
                            // Si la sesión ha expirado, muestra una alerta con SweetAlert2
                            Swal.fire({
                                title: 'Sesión expirada',
                                text: 'Tu sesión ha expirado. Por favor, inicia sesión nuevamente.',
                                icon: 'warning',
                                confirmButtonText: 'Ir al login'
                            }).then((result) => {
                                if (result.isConfirmed) {
                                    window.location.href = '/form-login'; // Redirige a la página de login
                                }
                            });
                        }
                    }
                });
            }

        });
    </script>
</body>

</html>
