<style>
    /* HERO — estilo electoral moderno */
    .hero-elecciones {
        --bg1: #0b1220;
        --bg2: #0f1b33;
        --brillo: 255, 255, 255;
        --acento1: #e53935;
        /* rojo */
        --acento2: #f6c90e;
        /* amarillo */
        --acento3: #2e7d32;
        /* verde */
        color: #e9eef6;
        width: 100%;
        max-width: 1040px;
        position: relative;
        background:
            radial-gradient(1200px 400px at 50% -10%, rgba(255, 255, 255, .06), transparent 60%),
            repeating-linear-gradient(90deg, rgba(255, 255, 255, .04) 0 2px, transparent 2px 12px),
            linear-gradient(180deg, var(--bg1), var(--bg2));
        border: 1px solid rgba(255, 255, 255, .1);
        box-shadow: 0 10px 40px rgba(0, 0, 0, .35), inset 0 0 0 1px rgba(255, 255, 255, .06);
        backdrop-filter: blur(6px);
        overflow: hidden;
    }

    /* Franja tricolor sutil en el borde inferior */
    .hero-elecciones::after {
        content: "";
        position: absolute;
        inset: auto 0 0 0;
        height: 4px;
        background: linear-gradient(90deg, var(--acento1), var(--acento2), var(--acento3));
        filter: saturate(1.2);
        animation: correr 6s linear infinite;
        background-size: 200% 100%;
    }

    /* brillos suaves */
    .hero-elecciones::before {
        content: "";
        position: absolute;
        inset: -30% -20% auto -20%;
        height: 60%;
        background: radial-gradient(50% 60% at 50% 50%, rgba(var(--brillo), .06), transparent 60%);
        pointer-events: none;
    }

    /* Ícono con pulso sutil */
    .hero-icon {
        color: #ffffff;
        opacity: .95;
        transform-origin: center;
        animation: flotar 4.8s ease-in-out infinite;
        filter: drop-shadow(0 6px 18px rgba(0, 0, 0, .25));
    }

    /* Título con gradiente animado */
    .hero-title .txt-gradient {
        display: inline-block;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: .5px;
        font-size: clamp(1.6rem, 3.7vw, 2.75rem);
        background: linear-gradient(90deg, #ffffff 0%, #c8d6ff 40%, #ffffff 80%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: brillo 5s ease-in-out infinite;
        text-shadow: 0 0 18px rgba(255, 255, 255, .06);
    }

    .hero-sub {
        font-size: clamp(.9rem, 2.2vw, 1.05rem);
        letter-spacing: .35rem;
        margin-top: .25rem;
        font-weight: 700;
        opacity: .9;
        position: relative;
        display: inline-block;
    }

    /* Subrayado animado estilo “urna” */
    .hero-sub::after {
        content: "";
        display: block;
        height: 3px;
        margin: .35rem auto 0;
        width: 140px;
        background: linear-gradient(90deg, var(--acento1), var(--acento2), var(--acento3));
        background-size: 200% 100%;
        animation: correr 6s linear infinite;
        border-radius: 999px;
    }

    /* Chips */
    .chip {
        --chip-bg: rgba(255, 255, 255, .06);
        padding: .45rem .75rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, .12);
        background: var(--chip-bg);
        font-weight: 600;
        font-size: .9rem;
        transition: transform .2s ease, background .2s ease, border-color .2s ease;
        user-select: none;
    }

    .chip:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, .22);
    }

    /* Animaciones */
    @keyframes brillo {

        0%,
        100% {
            background-position: 0% 50%;
        }

        50% {
            background-position: 100% 50%;
        }
    }

    @keyframes correr {
        0% {
            background-position: 0% 50%;
        }

        100% {
            background-position: 200% 50%;
        }
    }

    @keyframes flotar {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-6px);
        }
    }

    /* Respeta usuarios con reduced motion */
    @media (prefers-reduced-motion: reduce) {

        .hero-icon,
        .hero-title .txt-gradient,
        .hero-elecciones::after,
        .hero-sub::after {
            animation: none !important;
        }
    }
</style>
<div class="row">
    <div class="col-12 d-flex justify-content-center mt-4">
        <section class="hero-elecciones text-center p-4 p-md-5 rounded-4">
            <div class="hero-icon mx-auto mb-3" aria-hidden="true">
                <!-- Ícono boleta -->
                <svg width="72" height="72" viewBox="0 0 24 24" fill="none" role="img">
                    <path d="M5 4h14a1 1 0 0 1 1 1v14l-4-3H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z" stroke="currentColor"
                        stroke-width="1.5" />
                    <path d="M8 8h8M8 11.5h8M8 15h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    <path d="M17 19v-3l4 3h-4Z" fill="currentColor" />
                </svg>
            </div>

            <h1 class="hero-title mb-2">
                <span class="txt-gradient">SISTEMA DE CONTEO RÁPIDO</span>
                <small class="d-block hero-sub">ELECCIONES</small>
            </h1>

            <p class="lead mb-4 opacity-75">
                Monitoreo en tiempo real de actas, mesas y resultados.
            </p>

            <div class="d-flex flex-wrap gap-2 justify-content-center">
                <span class="chip">Actas digitalizadas</span>
                <span class="chip">Cómputo por mesa</span>
                <span class="chip">Alertas y auditoría</span>
                <span class="chip">Panel en vivo</span>
            </div>
        </section>
    </div>

</div>
