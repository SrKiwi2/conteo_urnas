<!doctype html>
<html lang="en" class="light-style layout-wide customizer-hide" dir="ltr" data-theme="theme-default" data-assets-path="../../assets/" data-template="vertical-menu-template">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Conteo | Votos</title>

    <meta name="description" content="" />

    <link rel="icon" type="image/x-icon" href="../../assets/img/favicon/favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&ampdisplay=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../../assets/vendor/fonts/fontawesome.css" />
    <link rel="stylesheet" href="../../assets/vendor/fonts/tabler-icons.css" />
    <link rel="stylesheet" href="../../assets/vendor/fonts/flag-icons.css" />

    <link rel="stylesheet" href="../../assets/vendor/css/rtl/core.css" class="template-customizer-core-css" />
    <link rel="stylesheet" href="../../assets/vendor/css/rtl/theme-default.css" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="../../assets/css/demo.css" />

    <link rel="stylesheet" href="../../assets/vendor/libs/node-waves/node-waves.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/typeahead-js/typeahead.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/apex-charts/apex-charts.css" />

    <link rel="stylesheet" href="../../assets/vendor/libs/datatables-bs5/datatables.bootstrap5.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/datatables-responsive-bs5/responsive.bootstrap5.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/datatables-select-bs5/select.bootstrap5.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/datatables-checkboxes-jquery/datatables.checkboxes.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/datatables-fixedcolumns-bs5/fixedcolumns.bootstrap5.css" />
    <link rel="stylesheet" href="../../assets/vendor/libs/datatables-fixedheader-bs5/fixedheader.bootstrap5.css" />

    <link rel="stylesheet" href="../../assets/vendor/libs/datatables-rowgroup-bs5/rowgroup.bootstrap5.css" />

    <link rel="stylesheet" href="../../assets/vendor/css/pages/page-misc.css" />

    <script src="../../assets/vendor/js/helpers.js"></script>
    <script src="../../assets/vendor/js/template-customizer.js"></script>
    <script src="../../assets/js/config.js"></script>
</head>

<body>

    <div class="container-xxl container-p-y">
        <div class="misc-wrapper">
            <h2 class="mb-1 mt-4">Total de votos - actualmente</h2>
            <p class="mb-4 mx-2">Votos totales emitidos por cada mesa</p>
            <div class="container-xxl flex-grow-1 container-p-y">
                <div class="row">
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - Estudiante</h5>
                                </div>
                                <div id="donutChart"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - Docente</h5>
                                </div>
                                <div id="donutChart1"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - General</h5>
                                </div>
                                <div id="donutChart2"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header d-flex justify-content-lg-between">
                        <h5>Registro Voto</h5>
                        <button type="button" class="btn btn-primary" onclick="cargarFormulario()" data-bs-toggle="modal"
                            data-bs-target="#modalFormularioVoto">
                            <i class="fa-solid fa-user-plus"></i> Agregar Voto
                        </button>
                    </div>
                    <div class="card-datatable table-responsive pt-0">
                        <table class="datatables-basic table table-hover" id="data-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>FACULTDAD</th>
                                    <th>CARRERA</th>
                                    <th>OPCIONES</th>
                                </tr>
                            </thead>
                            <tbody class="animate__animated animate__bounceInDown">
                                <tr th:each="carrera, index: ${listarCarreras}">
                                    <th th:text="${index.index+1}"></th>
                                    <th th:text="${carrera.facultad.nombre_facultad}"></th>
                                    <th th:text="${carrera.nombre_carrera}"></th>
                                    <th>modal</th>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <script>
                    $('#data-table').DataTable({
                        language: {
                            "sProcessing": "Procesando...",
                            "sLengthMenu": "Mostrar _MENU_ registros",
                            "sZeroRecords": "No se encontraron resultados",
                            "sInfo": "Mostrando registros del _START_ al _END_ de un total de _TOTAL_ registros",
                            "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
                            "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
                            "sInfoPostFix": "",
                            "sSearch": "Buscar:",
                            "sUrl": "",
                            "sInfoThousands": ",",
                            "sLoadingRecords": "Cargando...",
                            "oPaginate": {
                                "sFirst": "Primero",
                                "sLast": "Último",
                                "sNext": "Siguiente",
                                "sPrevious": "Anterior"
                            },
                            "oAria": {
                                "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                                "sSortDescending": ": Activar para ordenar la columna de manera descendente"
                            }
                        }
                    });
                </script>
            </div>
        </div>
    </div>

    
    <div class="container-fluid misc-bg-wrapper">
        <img src="../../assets/img/illustrations/bg-shape-image-light.png" alt="page-misc-error"
            data-app-light-img="illustrations/bg-shape-image-light.png"
            data-app-dark-img="illustrations/bg-shape-image-dark.png" />
    </div>

    <script>
        $(document).ready(function () {
            cargarTabla();

        });

        function cargarTabla() {
            $.ajax({
                type: 'POST',
                url: "/publico/tabla-votos",
                success: function (response) {
                    $("#tablaVotos").html(response);
                }
            });
        }
    </script>

    <script src="../../assets/vendor/libs/datatables-bs5/datatables-bootstrap5.js"></script>
    <script src="../../assets/js/tables-datatables-extensions.js"></script>

    <script src="../../assets/vendor/libs/jquery/jquery.js"></script>
    <script src="../../assets/vendor/libs/popper/popper.js"></script>
    <script src="../../assets/vendor/js/bootstrap.js"></script>
    <script src="../../assets/vendor/libs/node-waves/node-waves.js"></script>
    <script src="../../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="../../assets/vendor/libs/hammer/hammer.js"></script>
    <script src="../../assets/vendor/libs/i18n/i18n.js"></script>
    <script src="../../assets/vendor/libs/typeahead-js/typeahead.js"></script>
    <script src="../../assets/vendor/js/menu.js"></script>

    <script src="../../assets/vendor/libs/apex-charts/apexcharts.js"></script>

    <script src="../../assets/js/main.js"></script>

    <script src="../../assets/js/charts-apex.js"></script>

    
</body>

</html>
