<body>

    <div class="container-xxl container-p-y">
        <div class="misc-wrapper">
            <h2 class="mb-1 mt-4">Total de votos - actualmente</h2>
            <p class="mb-4 mx-2">Votos totales emitidos por cada mesa</p>
            <div class="container-xxl flex-grow-1 container-p-y">
                <div class="row">
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - Estudiante</h5>
                                </div>
                                <div id="donutChart"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - Docente</h5>
                                </div>
                                <div id="donutChart1"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - General</h5>
                                </div>
                                <div id="donutChart2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="tablaVotos"></div>
        </div>
    </div>
    <div class="container-fluid misc-bg-wrapper">
        <img src="../../assets/img/illustrations/bg-shape-image-light.png" alt="page-misc-error"
            data-app-light-img="illustrations/bg-shape-image-light.png"
            data-app-dark-img="illustrations/bg-shape-image-dark.png" />
    </div>

    <script>
        $(document).ready(function () {
            cargarTabla();

        });

        function cargarTabla() {
            $.ajax({
                type: 'POST',
                url: "/publico/tabla-votos",
                success: function (response) {
                    $("#tablaVotos").html(response);
                }
            });
        }
    </script>
