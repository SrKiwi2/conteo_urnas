<body>
    <div class="container-xxl container-p-y">
        <div class="misc-wrapper">
            <h2 class="mb-1 mt-4" style="color: white;">TOTAL DE VOTOS</h2>
            <p class="mb-4 mx-2" style="color: white;">ELECCIONES 2025 - 2029</p>
            <div class="container-xxl flex-grow-1 container-p-y">
                <div class="row">
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - Estudiantes</h5>
                                </div>
                                <div id="donutChart" th:data-sum-valido="${sumValido_E}"

                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - Docentes</h5>
                                </div>
                                <div id="donutChart1" th:data-sum-valido-d="${sumValido_D}"
                                    th:data-sum-blanco-d="${sumBlanco_D}" th:data-sum-nulo-d="${sumNulo_D}">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-12 mb-4">
                        <div class="card">
                            <div class="card-body">
                                <div class="card-body text-center">
                                    <h5>Total - Generales</h5>
                                </div>
                                <div id="donutChart2" th:data-sum-valido-t="${sumValido_T}"
                                    th:data-sum-blanco-t="${sumBlanco_T}" th:data-sum-nulo-t="${sumNulo_T}">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-datatable table-responsive pt-0">
                        <table class="datatables-basic table table-hover" id="data-tableFac">

                                <tr>

                                    <th>FACULTDAD</th>

                                </tr>
                            </thead>

                                    <th th:text="${index.index+1}"></th>
                                    <th th:text="${facultad.nombre_facultad}"></th>
                                    <th>
                                        <button type="button" class="btn btn-primary"

                                            <i class="fa-solid fa-check-to-slot"> Votos</i>
                                        </button>

                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            <div class="container-fluid" id="contenidoMesasPublica"></div>
        </div>
    </div>

                                    </div>
                                </div>
                            </div>

    <script>
        $(document).ready(function () {
            //cargarTabla();
            cargarMesas();

            $('#data-tableFac').DataTable({
                language: {
                    "sProcessing": "Procesando...",
                    "sLengthMenu": "Mostrar _MENU_ registros",
                    "sZeroRecords": "No se encontraron resultados",

                    "sInfoEmpty": "Mostrando registros del 0 al 0 de un total de 0 registros",
                    "sInfoFiltered": "(filtrado de un total de _MAX_ registros)",
                    "sInfoPostFix": "",
                    "sSearch": "Buscar:",
                    "sUrl": "",
                    "sInfoThousands": ",",
                    "sLoadingRecords": "Cargando...",
                    "oPaginate": {
                        "sFirst": "Primero",
                        "sLast": "Último",
                        "sNext": "Siguiente",
                        "sPrevious": "Anterior"
                    },
                    "oAria": {
                        "sSortAscending": ": Activar para ordenar la columna de manera ascendente",
                        "sSortDescending": ": Activar para ordenar la columna de manera descendente"
                    }
                }
            });
        });

        function cargarFormulario(id_facultad) {
            console.log("ID Facultad recibido: ", id_facultad);
            $.ajax({
                type: 'POST',
                url: "/publico/formularioFacultad/" + id_facultad,
                success: function (response) {
                    console.log("Datos recibidos", response)
                    console.log("ID Facultad recibido:", id_facultad);

                    const donutChartEl3 = document.querySelector('#donutChart3');
                    if (donutChartEl3 !== null) {
                        donutChartEl3.setAttribute('data-sum-valido-ef', response.sumValido_EF);
                        donutChartEl3.setAttribute('data-sum-blanco-ef', response.sumBlanco_EF);
                        donutChartEl3.setAttribute('data-sum-nulo-ef', response.sumNulo_EF);
                    }

                    const donutChartEl4 = document.querySelector('#donutChart4');
                    if (donutChartEl4 !== null) {
                        donutChartEl4.setAttribute('data-sum-valido-df', response.sumValido_DF);
                        donutChartEl4.setAttribute('data-sum-blanco-df', response.sumBlanco_DF);
                        donutChartEl4.setAttribute('data-sum-nulo-df', response.sumNulo_DF);
                    }

                    renderDonutChart();
                    
                },
                error: function (xhr, status, error) {
                    console.log("Error: ", error);
                }
            });
        }

        function renderDonutChart() {
            let cardColor, headingColor, labelColor, borderColor, legendColor;

            if (isDarkStyle) {
                cardColor = config.colors_dark.cardColor;
                headingColor = config.colors_dark.headingColor;
                labelColor = config.colors_dark.textMuted;
                legendColor = config.colors_dark.bodyColor;
                borderColor = config.colors_dark.borderColor;
            } else {
                cardColor = config.colors.cardColor;
                headingColor = config.colors.headingColor;
                labelColor = config.colors.textMuted;
                legendColor = config.colors.bodyColor;
                borderColor = config.colors.borderColor;
            }
            const chartColors = {
                column: {
                    series1: '#826af9',
                    series2: '#d2b0ff',
                    bg: '#f8d3ff'
                },
                donut: {
                    series1: '#fee802',
                    series2: '#3fd0bd',
                    series3: '#826bf8',
                    series4: '#2b9bf4',
                    series5: '#90EE90'
                },
                area: {
                    series1: '#29dac7',
                    series2: '#60f2ca',
                    series3: '#a5f8cd'
                }
            };

            function generateDataHeat(count, yrange) {
                let i = 0;
                let series = [];
                while (i < count) {
                    let x = 'w' + (i + 1).toString();
                    let y = Math.floor(Math.random() * (yrange.max - yrange.min + 1)) + yrange.min;

                    series.push({
                        x: x,
                        y: y
                    });
                    i++;
                }
                return series;
            }

            // Donut Chart 3
            // --------------------------------------------------------------------
            const donutChartEl3 = document.querySelector('#donutChart3');
            if (donutChartEl3 !== null) {
                const sumValidoEF = parseInt(donutChartEl3.getAttribute('data-sum-valido-ef'), 10);
                const sumBlancoEF = parseInt(donutChartEl3.getAttribute('data-sum-blanco-ef'), 10);
                const sumNuloEF = parseInt(donutChartEl3.getAttribute('data-sum-nulo-ef'), 10);

                const totalVotosEF = sumValidoEF + sumBlancoEF + sumNuloEF;

                console.log("sumValidoef:", sumValidoEF);
                console.log("sumBlancoef:", sumBlancoEF);
                console.log("sumNuloef:", sumNuloEF);

                let porcentajeValidoEF = 0;
                let porcentajeBlancoEF = 0;
                let porcentajeNuloEF = 0;

                if (totalVotosEF > 0) {
                    porcentajeValidoEF = (sumValidoEF / totalVotosEF) * 100;
                    porcentajeBlancoEF = (sumBlancoEF / totalVotosEF) * 100;
                    porcentajeNuloEF = (sumNuloEF / totalVotosEF) * 100;
                }

                const donutChartConfig3 = {
                    chart: {
                        height: 390,
                        type: 'donut'
                    },
                    labels: ['Blancos', 'Nulos', 'Validos'],
                    series: [porcentajeBlancoEF, porcentajeNuloEF, porcentajeValidoEF],
                    colors: [
                        chartColors.donut.series1,
                        chartColors.donut.series3,
                        chartColors.donut.series5
                    ],
                    stroke: {
                        show: false,
                        curve: 'straight'
                    },
                    dataLabels: {
                        enabled: true,
                        formatter: function (val, opt) {
                            return val.toFixed(2) + '%';
                        }
                    },
                    legend: {
                        show: true,
                        position: 'bottom',
                        markers: { offsetX: -3 },
                        itemMargin: {
                            vertical: 3,
                            horizontal: 10
                        },
                        labels: {
                            colors: legendColor,
                            useSeriesColors: false
                        }
                    },
                    plotOptions: {
                        pie: {
                            donut: {
                                labels: {
                                    show: true,
                                    name: {
                                        fontSize: '2rem',
                                        fontFamily: 'Public Sans'
                                    },
                                    value: {
                                        fontSize: '1.2rem',
                                        color: legendColor,
                                        fontFamily: 'Public Sans',
                                        formatter: function (val) {
                                            if (typeof val === 'number' && !isNaN(val)) {
                                                return val.toFixed(2); // Redondear a 2 decimales
                                            } else {
                                                return val; // Si no es un número, devolver el valor tal como está
                                            }
                                        }
                                    },
                                    total: {
                                        show: true,
                                        fontSize: '1.5rem',
                                        color: headingColor,
                                        label: 'Total',
                                        formatter: function (w) {
                                            return totalVotosEF + ' votos';
                                        }
                                    }
                                }
                            }
                        }
                    },
                    responsive: [
                        {
                            breakpoint: 992,
                            options: {
                                chart: {
                                    height: 380
                                },
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        colors: legendColor,
                                        useSeriesColors: false
                                    }
                                }
                            }
                        },
                        {
                            breakpoint: 576,
                            options: {
                                chart: {
                                    height: 320
                                },
                                plotOptions: {
                                    pie: {
                                        donut: {
                                            labels: {
                                                show: true,
                                                name: {
                                                    fontSize: '1.5rem'
                                                },
                                                value: {
                                                    fontSize: '1rem'
                                                },
                                                total: {
                                                    fontSize: '1.5rem'
                                                }
                                            }
                                        }
                                    }
                                },
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        colors: legendColor,
                                        useSeriesColors: false
                                    }
                                }
                            }
                        },
                        {
                            breakpoint: 420,
                            options: {
                                chart: {
                                    height: 280
                                },
                                legend: {
                                    show: false
                                }
                            }
                        },
                        {
                            breakpoint: 360,
                            options: {
                                chart: {
                                    height: 250
                                },
                                legend: {
                                    show: false
                                }
                            }
                        }
                    ]
                };
                const donutChart3 = new ApexCharts(donutChartEl3, donutChartConfig3);
                donutChart3.render();
            }

            // Donut Chart 4
            // --------------------------------------------------------------------
            const donutChartEl4 = document.querySelector('#donutChart4');
            if (donutChartEl4 !== null) {
                const sumValidoDF = parseInt(donutChartEl4.getAttribute('data-sum-valido-df'), 10);
                const sumBlancoDF = parseInt(donutChartEl4.getAttribute('data-sum-blanco-df'), 10);
                const sumNuloDF = parseInt(donutChartEl4.getAttribute('data-sum-nulo-df'), 10);

                const totalVotosDF = sumValidoDF + sumBlancoDF + sumNuloDF;

                console.log("sumValido:", sumValidoDF);
                console.log("sumBlanco:", sumBlancoDF);
                console.log("sumNulo:", sumNuloDF);

                let porcentajeValidoDF = 0;
                let porcentajeBlancoDF = 0;
                let porcentajeNuloDF = 0;

                if (totalVotosDF > 0) {
                    porcentajeValidoDF = (sumValidoDF / totalVotosDF) * 100;
                    porcentajeBlancoDF = (sumBlancoDF / totalVotosDF) * 100;
                    porcentajeNuloDF = (sumNuloDF / totalVotosDF) * 100;
                }

                const donutChartConfig4 = {
                    chart: {
                        height: 390,
                        type: 'donut'
                    },
                    labels: ['Blancos', 'Nulos', 'Validos'],
                    series: [porcentajeBlancoDF, porcentajeNuloDF, porcentajeValidoDF],
                    colors: [
                        chartColors.donut.series1,
                        chartColors.donut.series3,
                        chartColors.donut.series5
                    ],
                    stroke: {
                        show: false,
                        curve: 'straight'
                    },
                    dataLabels: {
                        enabled: true,
                        formatter: function (val, opt) {
                            return val.toFixed(2) + '%';
                        }
                    },
                    legend: {
                        show: true,
                        position: 'bottom',
                        markers: { offsetX: -3 },
                        itemMargin: {
                            vertical: 3,
                            horizontal: 10
                        },
                        labels: {
                            colors: legendColor,
                            useSeriesColors: false
                        }
                    },
                    plotOptions: {
                        pie: {
                            donut: {
                                labels: {
                                    show: true,
                                    name: {
                                        fontSize: '2rem',
                                        fontFamily: 'Public Sans'
                                    },
                                    value: {
                                        fontSize: '1.2rem',
                                        color: legendColor,
                                        fontFamily: 'Public Sans',
                                        formatter: function (val) {
                                            if (typeof val === 'number' && !isNaN(val)) {
                                                return val.toFixed(2); // Redondear a 2 decimales
                                            } else {
                                                return val; // Si no es un número, devolver el valor tal como está
                                            }
                                        }
                                    },
                                    total: {
                                        show: true,
                                        fontSize: '1.5rem',
                                        color: headingColor,
                                        label: 'Total',
                                        formatter: function (w) {
                                            return totalVotosDF + ' votos';
                                        }
                                    }
                                }
                            }
                        }
                    },
                    responsive: [
                        {
                            breakpoint: 992,
                            options: {
                                chart: {
                                    height: 380
                                },
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        colors: legendColor,
                                        useSeriesColors: false
                                    }
                                }
                            }
                        },
                        {
                            breakpoint: 576,
                            options: {
                                chart: {
                                    height: 320
                                },
                                plotOptions: {
                                    pie: {
                                        donut: {
                                            labels: {
                                                show: true,
                                                name: {
                                                    fontSize: '1.5rem'
                                                },
                                                value: {
                                                    fontSize: '1rem'
                                                },
                                                total: {
                                                    fontSize: '1.5rem'
                                                }
                                            }
                                        }
                                    }
                                },
                                legend: {
                                    position: 'bottom',
                                    labels: {
                                        colors: legendColor,
                                        useSeriesColors: false
                                    }
                                }
                            }
                        },
                        {
                            breakpoint: 420,
                            options: {
                                chart: {
                                    height: 280
                                },
                                legend: {
                                    show: false
                                }
                            }
                        },
                        {
                            breakpoint: 360,
                            options: {
                                chart: {
                                    height: 250
                                },
                                legend: {
                                    show: false
                                }
                            }
                        }
                    ]
                };
                const donutChart4 = new ApexCharts(donutChartEl4, donutChartConfig4);
                donutChart4.render();
            }
        }

        function cargarMesas() {
            // Verifica si la sesión está activa antes de cargar el contenido
            $.ajax({
                url: '/publico/tabla-mesa',
                method: "GET",
                success: function (data) {
                    
                    $("#contenidoMesasPublica").html(data); // Carga el contenido si todo está bien
                    
                },
                error: function (xhr) {
                    console.error('Error en la solicitud:', xhr);
                }
            });
        }
    </script>


</body>

</html>
