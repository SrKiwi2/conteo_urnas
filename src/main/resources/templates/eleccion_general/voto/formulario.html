<style>
  .select2-container .select2-dropdown {
    z-index: 2000;
  }
  .select2-container--open {
    z-index: 2000;
  }

  /* Mejoras para pantallas pequeñas */
  @media (max-width: 576px) {
    #modalFormularioVotog .modal-content {
      min-height: 100vh;
      border-radius: 0;
    }
    #modalFormularioVotog .modal-body {
      padding: 1rem 1rem 0.5rem;
    }
    #modalFormularioVotog .modal-header {
      padding: 0.75rem 1rem;
    }
    #modalFormularioVotog .modal-footer {
      padding: 0.75rem 1rem 1rem;
    }

    /* Agrandar labels y campos en mobile */
    #modalFormularioVotog .form-label {
      font-size: 1rem;
    }
    #modalFormularioVotog .form-control,
    #modalFormularioVotog .form-select {
      font-size: 1.05rem;
      padding: 0.75rem 0.9rem;
      min-height: 44px; /* pulgar-friendly */
    }

    #modalFormularioVotog .btn {
      padding: 0.8rem 1rem;
      font-size: 1rem;
    }
  }
</style>

<div class="modal-header">
  <h4
    class="modal-title"
    th:text="${edit}? 'Modificar Voto' : 'Registrar Voto'"
  ></h4>
  <a
    type="button"
    class="btn-close"
    data-bs-dismiss="modal"
    aria-label="Close"
  ></a>
</div>

<form
  id="formularioVotog"
  method="post"
  th:action="@{/votog/guardar}"
  th:object="${detalleVoto}"
  novalidate
>
  <div class="modal-body">
    <div class="row">
      <div class="col-12 mb-2">
        <label class="form-label">Mesa</label>
        <!-- IMPORTANTE: añade 'name' o th:field para que Spring la reciba -->
        <select
          class="form-select"
          id="idMesa"
          name="idMesa"
          <!--
          o
          th:field="*{mesaGeneral.idMesaGeneral}"
          si
          haces
          binding
          --
        >
          required>
          <option value="">-- Seleccione --</option>
          <option
            th:each="m : ${listaMesas}"
            th:value="${m.idMesaGeneral}"
            th:text="|${m.recinto.municipio.nombre} - ${m.recinto.nombre} - Mesa ${m.numeroMesa}|"
          ></option>
        </select>
        <div class="invalid-feedback">Seleccione una mesa.</div>
      </div>
    </div>

    <!-- 2x2 en móvil; 4 columnas en md+ -->
    <div class="row g-2">
      <div class="col-6 col-md-3">
        <label class="form-label">PDC</label>
        <input
          type="number"
          min="0"
          step="1"
          id="pdc"
          name="pdc"
          class="form-control"
          inputmode="numeric"
          value="0"
          required
        />
        <div class="invalid-feedback">Ingrese un número válido (≥ 0).</div>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">LIBRE</label>
        <input
          type="number"
          min="0"
          step="1"
          id="libre"
          name="libre"
          class="form-control"
          inputmode="numeric"
          value="0"
          required
        />
        <div class="invalid-feedback">Ingrese un número válido (≥ 0).</div>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">NULO</label>
        <input
          type="number"
          min="0"
          step="1"
          id="nulo"
          name="nulo"
          class="form-control"
          inputmode="numeric"
          value="0"
          required
        />
        <div class="invalid-feedback">Ingrese un número válido (≥ 0).</div>
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label">BLANCO</label>
        <input
          type="number"
          min="0"
          step="1"
          id="blanco"
          name="blanco"
          class="form-control"
          inputmode="numeric"
          value="0"
          required
        />
        <div class="invalid-feedback">Ingrese un número válido (≥ 0).</div>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" onclick="enviarResultados()" class="btn btn-success">
      Guardar
    </button>
  </div>
</form>

<script>
  manejarEnvioFormulario("#formularioVotog");

  function enviarResultados() {
    const payload = {
      idMesa: document.getElementById("idMesa").value
        ? parseInt(document.getElementById("idMesa").value)
        : null,
      pdc: parseInt(document.getElementById("pdc").value || "0"),
      libre: parseInt(document.getElementById("libre").value || "0"),
      nulo: parseInt(document.getElementById("nulo").value || "0"),
      blanco: parseInt(document.getElementById("blanco").value || "0"),
    };

    if (!payload.idMesa) {
      alert("Seleccione una mesa");
      return;
    }

    $.ajax({
      url: "/votog/guardar-resultados-mesa",
      type: "POST",
      data: {
        idMesa: $("#idMesa").val(), // <select> con el id de la mesa
        pdc: $("#pdc").val() || 0,
        libre: $("#libre").val() || 0,
        nulo: $("#nulo").val() || 0,
        blanco: $("#blanco").val() || 0,
      },
    })
      .done(function () {
        cargarTabla();
        actualizarYActivarSelectMesa();

        const $sel = $("#idMesa");
        $("#pdc, #libre, #nulo, #blanco").val(0);

        if ($sel.hasClass("select2-hidden-accessible")) {
          $sel.val(null).trigger("change"); // limpia visualmente Select2
        } else {
          $sel.val("");
        }

        bootstrap.Modal.getInstance(
          document.getElementById("modalFormularioVotog")
        ).hide();
      })
      .fail(function (xhr) {
        alert("Error al guardar: " + (xhr.responseText || xhr.status));
      });
  }
</script>
